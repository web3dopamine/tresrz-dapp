services:
  postgres:
    image: postgres:16-alpine
    container_name: tresrz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tresrz
      POSTGRES_PASSWORD: tresrz
      POSTGRES_DB: tresrz
    ports: ["5432:5432"]
    volumes: ["tresrz_pg:/var/lib/postgresql/data"]
volumes:
  tresrz_pg:
